<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サブスク編集</title>
    <style>
        /* 数値入力の▲▼矢印を非表示にする */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
<h1>サブスク編集</h1>

<!-- 編集フォーム -->
<!-- th:action：送信先URLにidを埋め込む -->
<!-- th:object：既存データをsubscriptionオブジェクトにバインド -->
<form th:action="@{/subscriptions/{id}/edit(id=${subscription.id})}"
      th:object="${subscription}"
      method="post">

    <!-- サービス名：既存の値がth:fieldで自動表示される -->
    <input type="text"
           th:field="*{name}"
           placeholder="サービス名（例：Netflix）"
           required />

    <!-- 月額料金：既存の値がth:fieldで自動表示される -->
    <input type="number"
           th:field="*{price}"
           placeholder="月額料金（円）"
           required />

    <!-- 請求日：既存の値がth:selectedで自動選択される -->
    <select th:field="*{billingDate}">
        <option value="">請求日を選択してください</option>
        <option th:each="day : ${#numbers.sequence(1, 31)}"
                th:value="${day}"
                th:text="${day} + '日'">
        </option>
    </select>

    <!-- カテゴリ：既存の値がth:fieldで自動表示される -->
    <input type="text"
           th:field="*{category}"
           placeholder="カテゴリ（例：動画）" />

    <button type="submit">編集する</button>
</form>

<!-- 一覧画面に戻るリンク -->
<a th:href="@{/subscriptions}">一覧に戻る</a>

</body>
</html>
